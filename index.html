<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老大我们真的要背这个吗</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f0eb; /* 低饱和度燕麦底色 */
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #5c5552; /* 灰褐色 */
            font-size: 24px;
            font-weight: normal;
            letter-spacing: 2px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }
        #chat-box {
            background-color: #ffffff;
            height: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 15px;
        }
        .ai-msg {
            background-color: #f8f9fa;
            color: #555;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .user-msg {
            background-color: #5c5552;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex-grow: 1;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: #fff;
        }
        input:focus {
            border-color: #5c5552;
        }
        button {
            padding: 0 24px;
            background-color: #5c5552;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Welcome</h1>
        <p>这是一个离线的安静小角落，随便说点什么吧</p>
    </div>
    
    <div id="chat-box">
        <div class="message ai-msg">你好呀，朋友！欢迎来到这里。</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你想说的话..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        // 这里是一些预设好的随机回复，你可以随便修改里面的文字
        const randomReplies = [
            "原来是这样，很有意思！",
            "收到啦，今天也要开开心心哦。",
            "这段话我偷偷藏在这个网页里了。",
            "电波接收成功！( •̀ ω •́ )y",
            "哇，听起来不错！",
            "确实呢，我也这么觉得。",
            "今天辛苦啦，好好放松一下吧。"
        ];

        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();
            
            if (!message) return;

            // 显示用户发送的消息
            chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 假装思考了 0.8 秒钟，然后给出随机回复
            setTimeout(() => {
                const randomText = randomReplies[Math.floor(Math.random() * randomReplies.length)];
                chatBox.innerHTML += `<div class="message ai-msg">${randomText}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
